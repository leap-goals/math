<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Unified Theory of Latent Potentials:Archive</title>
    
    <!-- MathJax: 動的レンダリング設定 -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
            options: { enableMenu: false }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

    <style>
        :root {
            --bg: #020617; /* Midnight Blue */
            --header-bg: rgba(15, 23, 42, 0.9);
            --card-bg: #0f172a; /* Slate 900 */
            --primary: #818cf8; /* Indigo 400 */
            --primary-hover: #6366f1;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --accent: #1e1b4b; /* Deep Indigo */
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            line-height: 1.6;
        }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { 
            margin: 0; font-size: 1rem; font-weight: 800; letter-spacing: 0.05em;
            background: linear-gradient(to right, var(--primary), #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { padding: 20px 16px; max-width: 640px; margin: 0 auto; }

        /* 全項目対応目次 */
        .toc-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .toc-title { font-size: 0.7rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 16px; }
        .toc-main-ul { list-style: none; padding: 0; margin: 0; }
        .toc-section-li { margin-bottom: 16px; }
        .toc-section-link { color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 800; display: block; margin-bottom: 8px; }
        
        /* サブ項目（各数式）の目次 */
        .toc-sub-ul { list-style: none; padding-left: 12px; border-left: 1px solid var(--border); }
        .toc-sub-li { margin-bottom: 6px; }
        .toc-sub-link { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; transition: color 0.2s; }
        .toc-sub-link:hover { color: var(--text); }

        /* コンテンツ */
        .section-title { font-size: 1.2rem; font-weight: 800; margin: 50px 0 20px; scroll-margin-top: 120px; }
        
        .card {
            background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px;
            border: 1px solid var(--border); position: relative; scroll-margin-top: 100px;
        }

        .card-header { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; padding-right: 60px; }
        .formula-display { font-size: 1.1rem; overflow-x: auto; padding: 10px 0; color: var(--text); }

        .copy-btn {
            position: absolute; top: 16px; right: 16px;
            background: var(--accent); border: none; color: var(--primary); padding: 5px 10px;
            border-radius: 6px; font-size: 0.65rem; cursor: pointer; font-weight: 800;
        }

        .footer-note { text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 60px; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <h1>A Unified Theory of Latent Potentials:Archive</h1>
</header>

<div class="container">
    <div id="toc-container" class="toc-card">
        <div class="toc-title">Detailed Index</div>
        <ul id="toc-list" class="toc-main-ul"></ul>
    </div>
    <div id="content-main"></div>
    <div class="footer-note">2026 potential_unity_theory. archived by risaki.</div>
</div>

<script>
    const theoryData = [
        {
            section: "1. 認知ダイナミクスの基礎理論",
            id: "sec1",
            items: [
                { id: "1-1", title: "2.1 認知世界の定義", math: "W = W_{\\text{current\\&future}}" },
                { id: "1-2", title: "2.2 可能世界の順序づけ", math: "r : W \\to W" },
                { id: "1-3", title: "2.3 TCZの可能世界論的定義", math: "\\{ w \\mid \\forall y \\exists x r_{\\text{TCZ}}(x, y) \\}, x, y \\in W_{\\text{current\\&future}}" },
                { id: "1-4", title: "2.4 Self / Ego 演算子", math: "\\{ w \\mid \\forall y \\exists x s_{\\text{Self}}(x, y) \\}, s : \\text{TCZ} \\to \\text{TCZ}" },
                { id: "1-5", title: "2.5 Egoの最適制御モデル", math: "\\pi_c(x) = \\arg \\min_{u(t)} \\int_0^T V(x(t), t) dt" },
                { id: "1-6", title: "2.7 TCZの状態空間定義", math: "\\text{TCZ}(x_0) = \\bigcup_{t \\ge 0} \\{ x(t) \\in \\mathcal{R}(t; x_0) \\mid V(x(t), t) \\le \\theta \\}" }
            ]
        },
        {
            section: "2. 多主体および社会的拡張",
            id: "sec2",
            items: [
                { id: "2-1", title: "2.11.2 多主体への拡張", math: "\\pi_i = \\arg \\min_{u_i(t)} \\int_0^T ( V_i(x_i(t), t) + \\sum_j \\gamma_{ij} S_{ij}(x_i, x_j) ) dt" },
                { id: "2-2", title: "2.11.3 Shared TCZの定義", math: "\\text{TCZ}_\\eta^{\\text{shared}} = \\{ x \\in \\prod_i \\text{TCZ}_i \\mid \\text{Share}(x) \\ge \\eta \\}" },
                { id: "2-3", title: "2.12.3 抽象度依存型共有関数", math: "S_i(x; \\alpha_i) = \\sum_{j \\ne i} w_{ij}(\\alpha_i) d(x_i, x_j)" },
                { id: "2-4", title: "2.13.3 Shared-TCZの形式的定義", math: "\\text{TCZ}_{\\text{low}}^{\\text{shared}} = \\bigcap_{i=1}^N \\text{TCZ}_i" },
                { id: "2-5", title: "2.13.4 定理3（抽象Shared-TCZ収束）", math: "\\pi_i = \\arg \\min_{u_i(t)} \\int_0^T ( V_i(x_i(t), t) + \\sum_j \\gamma_{ij} S_{ij}(x_i, x_j) + \\eta_i A(x_i(t)) ) dt" }
            ]
        },
        {
            section: "3. 物理系との構造的対応",
            id: "sec3",
            items: [
                { id: "3-1", title: "4. 物理系における空間積分", math: "\\int U(r) \\rho dV" },
                { id: "3-2", title: "5. 境界効果", math: "\\gamma \\sim \\int_{\\partial\\Omega} U(r) dS" },
                { id: "3-3", title: "7. 統一累積原理", math: "\\int U(r) \\rho dV \\leftrightarrow \\int_0^T V(x(t), t) dt" }
            ]
        },
        {
            section: "4. 認知戦および情報生成",
            id: "sec4",
            items: [
                { id: "4-1", title: "13. 認知戦（評価関数の変容）", math: "V(x, t) \\to V'(x, t)" },
                { id: "4-2", title: "A.2 境界レベルの最小介入制御", math: "u^*_{\\text{cw}}(t) = \\arg \\min_{u(t)} \\int_0^T ( |V(x(t), t) - \\theta|^2 + \\lambda C(u(t)) ) dt" },
                { id: "4-3", title: "A.3 メッセージ受容モデル", math: "A(m \\mid x_t) = \\exp( - d( \\phi(m), \\text{TCZ}(x_t) )^2 / \\sigma^2 )" }
            ]
        }
    ];

    const tocList = document.getElementById('toc-list');
    const contentMain = document.getElementById('content-main');

    theoryData.forEach(data => {
        // 目次セクション
        const secLi = document.createElement('li');
        secLi.className = 'toc-section-li';
        
        const secLink = document.createElement('a');
        secLink.href = `#${data.id}`;
        secLink.className = 'toc-section-link';
        secLink.innerText = data.section;
        secLi.appendChild(secLink);

        const subUl = document.createElement('ul');
        subUl.className = 'toc-sub-ul';

        // コンテンツセクションタイトル
        const h2 = document.createElement('h2');
        h2.className = 'section-title';
        h2.id = data.id;
        h2.innerText = data.section;
        contentMain.appendChild(h2);

        data.items.forEach(item => {
            // 目次サブ項目
            const subLi = document.createElement('li');
            subLi.className = 'toc-sub-li';
            const subLink = document.createElement('a');
            subLink.href = `#item-${item.id}`;
            subLink.className = 'toc-sub-link';
            subLink.innerText = item.title;
            subLi.appendChild(subLink);
            subUl.appendChild(subLi);

            // 数式カード生成
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `item-${item.id}`;
            card.innerHTML = `
                <button class="copy-btn" onclick="copyText('${item.math.replace(/\\/g, '\\\\')}')">COPY</button>
                <div class="card-header">${item.title}</div>
                <div class="formula-display">$$ ${item.math} $$</div>
            `;
            contentMain.appendChild(card);
        });
        secLi.appendChild(subUl);
        tocList.appendChild(secLi);
    });

    // 数式表示の強制再実行
    window.addEventListener('load', () => {
        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise();
        }
    });

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            btn.innerText = 'COPIED';
            setTimeout(() => btn.innerText = 'COPY', 2000);
        });
    }
</script>

</body>
</html>
